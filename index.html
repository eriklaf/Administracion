<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control Mensual GAPHIN - Conjunto Gaviota</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo-section">
                <h1>Control Gaphin</h1>
                <p>Conjunto Residencial Gaviota</p>
            </div>
            <div class="controls">
                <select id="monthSelect"></select>
                <select id="yearSelect"></select>
                <button id="resetBtn" title="Reiniciar Mes">
                    <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
            </div>
        </header>

        <main>
            <section class="summary-cards">
                <div class="card total-progress">
                    <h3>Cumplimiento Total</h3>
                    <div class="progress-circle-container">
                        <svg viewBox="0 0 36 36" class="circular-chart">
                            <path class="circle-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <path class="circle" stroke-dasharray="0, 100" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
                            <text x="18" y="20.35" class="percentage">0%</text>
                        </svg>
                    </div>
                </div>
                <div class="card status-info">
                    <div class="stat-item">
                        <span class="label">Puntos Cubiertos</span>
                        <span class="value" id="coveredCount">0 / 0</span>
                    </div>
                    <div class="stat-item">
                        <span class="label">Categoría Líder</span>
                        <span class="value" id="topCategory">-</span>
                    </div>
                </div>
            </section>

            <div id="categoriesContainer" class="categories-grid">
                <!-- Categorías se cargarán dinámicamente -->
            </div>
        </main>

        <footer>
            <p>&copy; 2026 Cuadro de Control Operativo - Contrato GAPHIN SAS</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
